<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{SUBJECT}} — Mind Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #0D0D0D;
  --surface: #141414;
  --surface2: #1A1A1A;
  --border: #242424;
  --text: #E6E1D6;
  --muted: #555;
  --muted2: #888;
  --accent: #C8B97A;

  {{COLOR_VARS}}
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
header {
  padding: 24px 36px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo span { color: var(--muted2); font-weight: 400; font-size: 13px; margin-left: 12px; font-family: 'DM Mono', monospace; }

/* ── Mode Toggle ── */
.mode-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.mode-btn {
  padding: 8px 20px;
  font-size: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted2);
  transition: all 0.2s;
}

.mode-btn.active {
  background: var(--surface2);
  color: var(--text);
}

/* ── Breadcrumb ── */
.breadcrumb {
  padding: 14px 36px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}

.crumb {
  color: var(--muted2);
  cursor: pointer;
  transition: color 0.15s;
}
.crumb:hover { color: var(--accent); }
.crumb.active { color: var(--text); cursor: default; }
.crumb-sep { color: var(--border); }

/* ── Main ── */
main {
  padding: 36px;
  max-width: 1200px;
}

.view { display: none; }
.view.active { display: block; }

/* ── Screen: Home (themes) ── */
.screen-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 24px;
}

.theme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.theme-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.theme-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--color);
  opacity: 0;
  transition: opacity 0.18s;
  border-radius: 12px;
}

.theme-card:hover::after { opacity: 0.05; }
.theme-card:hover { border-color: var(--color); transform: translateY(-2px); }

.theme-icon {
  font-size: 28px;
  margin-bottom: 14px;
  display: block;
}

.theme-name {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.theme-meta {
  font-size: 11px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}

.theme-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color);
  margin-right: 6px;
  vertical-align: middle;
}

.theme-arrow {
  position: absolute;
  right: 20px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 18px;
  transition: all 0.18s;
}

.theme-card:hover .theme-arrow { color: var(--color); right: 16px; }

/* ── Screen: Sub-clusters ── */
.subcluster-list { display: flex; flex-direction: column; gap: 10px; }

.subcluster-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.18s;
}

.subcluster-card:hover {
  border-color: var(--color);
  background: var(--surface2);
  transform: translateX(4px);
}

.sub-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--color);
  opacity: 0.7;
  min-width: 28px;
}

.sub-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 600;
  flex: 1;
}

.sub-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.sub-tag {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: var(--muted2);
  border: 1px solid var(--border);
}

.sub-arrow {
  color: var(--muted);
  font-size: 16px;
  transition: all 0.18s;
}

.subcluster-card:hover .sub-arrow { color: var(--color); }

/* ── Screen: Detail ── */
.detail-header {
  margin-bottom: 32px;
}

.detail-title {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}

.detail-subtitle {
  font-size: 13px;
  color: var(--muted2);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
}

.detail-block.full { grid-column: 1 / -1; }

.block-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'DM Mono', monospace;
  color: var(--color);
  margin-bottom: 10px;
  opacity: 0.8;
}

.block-text {
  font-size: 13px;
  color: #AAA;
  line-height: 1.7;
}

.block-text ul { list-style: none; padding: 0; }
.block-text ul li {
  padding: 4px 0 4px 14px;
  position: relative;
}
.block-text ul li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--color);
  opacity: 0.5;
  font-size: 10px;
  top: 5px;
}

.formula-block {
  background: #0A0A0A;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  line-height: 2;
  white-space: pre-wrap;
}

.lec-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.lec-chip {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--color);
  color: var(--color);
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
  transition: all 0.18s;
  background: transparent;
}

.lec-chip:hover {
  background: var(--color);
  color: var(--bg);
}

/* ── Screen: Lecture View ── */
.lec-view-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 32px;
}

.lec-badge {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--color);
  color: var(--color);
  white-space: nowrap;
}

.lec-title-block .lec-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}

.lec-title-block .lec-chapter {
  font-size: 12px;
  color: var(--muted2);
  font-family: 'DM Mono', monospace;
}

.concept-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.concept-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 13px;
  color: #AAA;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.concept-bullet {
  color: var(--color);
  opacity: 0.6;
  font-size: 10px;
  margin-top: 3px;
  flex-shrink: 0;
}

/* ── Lectures Home ── */
.lec-home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.lec-home-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 22px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.lec-home-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--color);
}

.lec-home-card:hover {
  border-color: var(--color);
  background: var(--surface2);
  transform: translateY(-2px);
}

.lh-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--color);
  margin-bottom: 6px;
  opacity: 0.8;
}

.lh-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
}

.lh-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.lh-tag {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  padding: 2px 7px;
  border-radius: 6px;
  background: rgba(255,255,255,0.03);
  color: var(--muted2);
  border: 1px solid var(--border);
}

/* ── Graph View ── */
#graph-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 120px);
  overflow: hidden;
}

#graph-svg {
  width: 100%;
  height: 100%;
  cursor: grab;
}

#graph-svg:active { cursor: grabbing; }

.graph-panel {
  position: absolute;
  top: 0; right: -440px;
  width: 420px;
  height: 100%;
  background: #111;
  border-left: 1px solid var(--border);
  overflow-y: auto;
  transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  padding: 28px 28px 40px;
  z-index: 10;
}

.graph-panel.open { right: 0; }

.panel-close {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted2);
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}

.panel-close:hover { color: var(--text); }

/* Node styles */
.node-root circle  { fill: #C8B97A; stroke: #9A8D5A; stroke-width: 2; }
.node-theme circle { stroke-width: 2; fill-opacity: 0.15; }
.node-sub circle   { stroke-width: 1.5; fill-opacity: 0.1; }
.node-lec circle   { stroke-width: 1; fill-opacity: 0.08; }

.node text {
  fill: #CCC;
  font-family: 'DM Sans', sans-serif;
  pointer-events: none;
  dominant-baseline: middle;
}

.node-root text { fill: #0D0D0D; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; }
.node-theme text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; }
.node-sub text   { font-size: 10px; fill: #AAA; }
.node-lec text   { font-size: 9px; fill: #777; font-family: 'DM Mono', monospace; }

.link {
  fill: none;
  stroke-opacity: 0.25;
}

.node { cursor: pointer; transition: opacity 0.2s; }
.node:hover circle { filter: brightness(1.4); }

.node.dimmed { opacity: 0.15; }
.link.dimmed { opacity: 0.05; }

</style>
</head>
<body>

<header>
  <div class="logo">{{SUBJECT}} <span>{{META}}</span></div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('concept')">Concept View</button>
    <button class="mode-btn" onclick="setMode('lecture')">Lecture View</button>
    <button class="mode-btn" onclick="setMode('graph')">Graph View</button>
  </div>
</header>

<div class="breadcrumb" id="breadcrumb"></div>

<main>
  <!-- CONCEPT MODE -->
  <div class="view active" id="view-concept">

    <!-- Screen: Theme Home -->
    <div id="screen-themes" class="screen">
      <div class="screen-label">Select a theme to explore</div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>

    <!-- Screen: Sub-clusters -->
    <div id="screen-subclusters" class="screen" style="display:none">
      <div class="screen-label" id="sc-label"></div>
      <div class="subcluster-list" id="subcluster-list"></div>
    </div>

    <!-- Screen: Detail -->
    <div id="screen-detail" class="screen" style="display:none">
      <div class="detail-header">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-subtitle" id="detail-subtitle"></div>
      </div>
      <div class="detail-grid" id="detail-grid"></div>
    </div>

  </div>

  <!-- LECTURE MODE -->
  <div class="view" id="view-lecture">

    <!-- Screen: Lecture Home -->
    <div id="screen-lec-home" class="screen">
      <div class="screen-label">Select a lecture</div>
      <div class="lec-home-grid" id="lec-home-grid"></div>
    </div>

    <!-- Screen: Lecture Detail -->
    <div id="screen-lec-detail" class="screen" style="display:none">
      <div class="lec-view-header">
        <div class="lec-badge" id="lec-badge"></div>
        <div class="lec-title-block">
          <div class="lec-title" id="lec-title"></div>
          <div class="lec-chapter" id="lec-chapter"></div>
        </div>
      </div>
      <div class="screen-label">Concepts covered</div>
      <div class="concept-list" id="lec-concept-list"></div>
      <div id="lec-formula-wrap"></div>
    </div>

  </div>

  <!-- GRAPH MODE -->
  <div class="view" id="view-graph">
    <div id="graph-container">
      <svg id="graph-svg"></svg>
      <div id="graph-panel" class="graph-panel">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div id="panel-content"></div>
      </div>
    </div>
  </div>

</main>

<script>
// ─────────────────────────────────────────────
// DATA — injected by renderer.py
// ─────────────────────────────────────────────

{{SCHEMA_JSON}}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let mode = 'concept'; // 'concept' | 'lecture'
let conceptPath = []; // [{type:'home'}, {type:'theme', id}, {type:'subcluster', id}, {type:'lecture', id, from}]
let lecturePath = []; // [{type:'home'}, {type:'lecture', id, from?}]

// ─────────────────────────────────────────────
// MODE SWITCH
// ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && m==='concept') || (i===1 && m==='lecture') || (i===2 && m==='graph'));
  });
  document.getElementById('view-concept').classList.toggle('active', m==='concept');
  document.getElementById('view-lecture').classList.toggle('active', m==='lecture');
  document.getElementById('view-graph').classList.toggle('active', m==='graph');

  if (m === 'concept') {
    if (conceptPath.length === 0) goConceptHome();
    else renderConceptFromPath();
  } else if (m === 'lecture') {
    if (lecturePath.length === 0) goLectureHome();
    else renderLectureFromPath();
  } else if (m === 'graph') {
    document.getElementById('breadcrumb').innerHTML = '';
    setTimeout(initGraph, 50);
  }
}

// ─────────────────────────────────────────────
// CONCEPT MODE
// ─────────────────────────────────────────────
function goConceptHome() {
  conceptPath = [{type:'home'}];
  renderConceptFromPath();
}

function goTheme(themeId) {
  conceptPath = [{type:'home'}, {type:'theme', id: themeId}];
  renderConceptFromPath();
}

function goSubcluster(themeId, scId) {
  conceptPath = [{type:'home'}, {type:'theme', id: themeId}, {type:'subcluster', id: scId}];
  renderConceptFromPath();
}

function goLectureFromConcept(lecId, fromThemeId, fromScId) {
  conceptPath.push({type:'lecture', id: lecId, fromTheme: fromThemeId, fromSc: fromScId});
  renderConceptFromPath();
}

function renderConceptFromPath() {
  const last = conceptPath[conceptPath.length - 1];
  // Hide all screens
  ['screen-themes','screen-subclusters','screen-detail'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });

  if (last.type === 'home') {
    renderThemeHome();
    document.getElementById('screen-themes').style.display = '';
  } else if (last.type === 'theme') {
    renderSubclusters(last.id);
    document.getElementById('screen-subclusters').style.display = '';
  } else if (last.type === 'subcluster') {
    const themeId = conceptPath.find(p=>p.type==='theme')?.id;
    renderDetail(themeId, last.id);
    document.getElementById('screen-detail').style.display = '';
  } else if (last.type === 'lecture') {
    renderLectureInConceptMode(last.id);
    document.getElementById('screen-detail').style.display = '';
  }

  renderBreadcrumb();
}

function renderThemeHome() {
  const grid = document.getElementById('theme-grid');
  grid.innerHTML = themes.map(t => `
    <div class="theme-card" style="--color:${t.color}" onclick="goTheme('${t.id}')">
      <span class="theme-icon">${t.icon}</span>
      <div class="theme-name">${t.name}</div>
      <div class="theme-meta"><span class="theme-dot"></span>${t.sub}</div>
      <span class="theme-arrow">›</span>
    </div>
  `).join('');
}

function renderSubclusters(themeId) {
  const theme = themes.find(t=>t.id===themeId);
  const scs = subclusters[themeId] || [];
  document.getElementById('sc-label').textContent = `${theme.name} — select a concept cluster`;
  const list = document.getElementById('subcluster-list');
  list.innerHTML = scs.map((sc, i) => `
    <div class="subcluster-card" style="--color:${theme.color}" onclick="goSubcluster('${themeId}','${sc.id}')">
      <span class="sub-num">0${i+1}</span>
      <span class="sub-name">${sc.name}</span>
      <div class="sub-tags">${sc.tags.map(t=>`<span class="sub-tag">${t}</span>`).join('')}</div>
      <span class="sub-arrow">›</span>
    </div>
  `).join('');
}

function renderDetail(themeId, scId) {
  const theme = themes.find(t=>t.id===themeId);
  const sc = subclusters[themeId].find(s=>s.id===scId);
  document.getElementById('detail-title').textContent = sc.name;
  document.getElementById('detail-subtitle').textContent = `${theme.name} cluster · ${sc.lectures.join(', ')}`;

  const grid = document.getElementById('detail-grid');
  grid.style.setProperty('--color', theme.color);

  const lec_chips = sc.lectures.map(l =>
    `<button class="lec-chip" style="--color:${theme.color}" onclick="goLectureFromConcept('${l}','${themeId}','${scId}')">${l} →</button>`
  ).join('');

  grid.innerHTML = `
    <div class="detail-block full" style="--color:${theme.color}">
      <div class="block-label">Definition</div>
      <div class="block-text">${sc.definition}</div>
    </div>
    <div class="detail-block" style="--color:${theme.color}">
      <div class="block-label">Key Concepts</div>
      <div class="block-text"><ul>${sc.keypoints.map(k=>`<li>${k}</li>`).join('')}</ul></div>
    </div>
    <div class="detail-block" style="--color:${theme.color}">
      <div class="block-label">Example</div>
      <div class="block-text">${sc.example}</div>
      ${sc.formula ? `<div class="block-label" style="margin-top:16px">Formulae</div><div class="formula-block">${sc.formula}</div>` : ''}
    </div>
    <div class="detail-block full" style="--color:${theme.color}">
      <div class="block-label">Jump to Lecture</div>
      <div class="lec-chips">${lec_chips}</div>
    </div>
  `;
}

function renderLectureInConceptMode(lecId) {
  const lec = lectures.find(l=>l.id===lecId);
  document.getElementById('detail-title').textContent = lec.title;
  document.getElementById('detail-subtitle').textContent = lec.chapter;

  const grid = document.getElementById('detail-grid');
  grid.style.setProperty('--color', lec.color);
  grid.innerHTML = `
    <div class="detail-block full" style="--color:${lec.color}">
      <div class="block-label">Concepts Covered</div>
      <div class="block-text"><ul>${lec.concepts.map(c=>`<li>${c}</li>`).join('')}</ul></div>
    </div>
    ${lec.formula ? `<div class="detail-block full" style="--color:${lec.color}">
      <div class="block-label">Key Formulae</div>
      <div class="formula-block">${lec.formula}</div>
    </div>` : ''}
  `;
}

// ─────────────────────────────────────────────
// LECTURE MODE
// ─────────────────────────────────────────────
function goLectureHome() {
  lecturePath = [{type:'home'}];
  renderLectureFromPath();
}

function goLectureDetail(lecId) {
  lecturePath = [{type:'home'}, {type:'lecture', id: lecId}];
  renderLectureFromPath();
}

function renderLectureFromPath() {
  const last = lecturePath[lecturePath.length-1];
  ['screen-lec-home','screen-lec-detail'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  if (last.type === 'home') {
    renderLecHome();
    document.getElementById('screen-lec-home').style.display = '';
  } else {
    renderLecDetail(last.id);
    document.getElementById('screen-lec-detail').style.display = '';
  }
  renderBreadcrumb();
}

function renderLecHome() {
  const grid = document.getElementById('lec-home-grid');
  grid.innerHTML = lectures.map(l => `
    <div class="lec-home-card" style="--color:${l.color}" onclick="goLectureDetail('${l.id}')">
      <div class="lh-num">${l.num}</div>
      <div class="lh-title">${l.title}</div>
      <div class="lh-tags">${l.tags.map(t=>`<span class="lh-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderLecDetail(lecId) {
  const lec = lectures.find(l=>l.id===lecId);
  document.getElementById('lec-badge').style.setProperty('--color', lec.color);
  document.getElementById('lec-badge').textContent = lec.num;
  document.getElementById('lec-title').textContent = lec.title;
  document.getElementById('lec-chapter').textContent = lec.chapter;

  const cl = document.getElementById('lec-concept-list');
  cl.style.setProperty('--color', lec.color);
  cl.innerHTML = lec.concepts.map(c => `
    <div class="concept-item">
      <span class="concept-bullet">▸</span>
      <span>${c}</span>
    </div>
  `).join('');

  const fw = document.getElementById('lec-formula-wrap');
  fw.innerHTML = lec.formula ? `
    <div class="screen-label" style="margin-top:24px; margin-bottom:12px;">Key Formulae</div>
    <div class="formula-block" style="--color:${lec.color}">${lec.formula}</div>
  ` : '';
}

// ─────────────────────────────────────────────
// BREADCRUMB
// ─────────────────────────────────────────────
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let crumbs = [];

  if (mode === 'concept') {
    conceptPath.forEach((p, i) => {
      const isLast = i === conceptPath.length - 1;
      if (p.type === 'home') {
        crumbs.push({ label: 'Themes', action: `goConceptHome()`, active: isLast });
      } else if (p.type === 'theme') {
        const t = themes.find(t=>t.id===p.id);
        crumbs.push({ label: t.name, action: `goTheme('${p.id}')`, active: isLast });
      } else if (p.type === 'subcluster') {
        const themeId = conceptPath.find(pp=>pp.type==='theme')?.id;
        const scs = subclusters[themeId] || [];
        const sc = scs.find(s=>s.id===p.id);
        crumbs.push({ label: sc.name, action: `goSubcluster('${themeId}','${p.id}')`, active: isLast });
      } else if (p.type === 'lecture') {
        crumbs.push({ label: p.id, action: null, active: isLast });
      }
    });
  } else {
    lecturePath.forEach((p, i) => {
      const isLast = i === lecturePath.length - 1;
      if (p.type === 'home') {
        crumbs.push({ label: 'All Lectures', action: `goLectureHome()`, active: isLast });
      } else if (p.type === 'lecture') {
        crumbs.push({ label: p.id, action: null, active: isLast });
      }
    });
  }

  bc.innerHTML = crumbs.map((c, i) => `
    ${i > 0 ? '<span class="crumb-sep">/</span>' : ''}
    <span class="crumb ${c.active ? 'active' : ''}" ${c.action && !c.active ? `onclick="${c.action}"` : ''}>${c.label}</span>
  `).join('');
}

// ─────────────────────────────────────────────
// GRAPH VIEW
// ─────────────────────────────────────────────

const themeColors = {
  // dynamically built from injected themes
  ...Object.fromEntries(themes.map((t, i) => [t.id, t._color_hex || ['#E07A5F','#6B8CAE','#90BE6D','#FF6B6B','#56CFE1','#C77DFF','#F2CC8F'][i]])),
  ops:      '#56CFE1',
};

function buildGraphData() {
  const nodes = [];
  const links = [];

  // Root
  const rootLabel = (typeof subjects !== 'undefined' ? subjects : document.title.split(' —')[0]).split(' ').slice(0,2).join(' ');
  nodes.push({ id: 'root', label: rootLabel, type: 'root', color: '#C8B97A', r: 34 });

  // Themes
  themes.forEach(t => {
    nodes.push({ id: t.id, label: t.name, type: 'theme', color: themeColors[t.id], r: 24, themeId: t.id });
    links.push({ source: 'root', target: t.id, color: themeColors[t.id] });

    // Subclusters
    const scs = subclusters[t.id] || [];
    scs.forEach(sc => {
      nodes.push({ id: sc.id, label: sc.name, type: 'sub', color: themeColors[t.id], r: 14, themeId: t.id, scId: sc.id });
      links.push({ source: t.id, target: sc.id, color: themeColors[t.id] });

      // Lectures
      const addedLecs = new Set();
      sc.lectures.forEach(lecId => {
        const nodeId = sc.id + '_' + lecId;
        if (!addedLecs.has(nodeId)) {
          addedLecs.add(nodeId);
          nodes.push({ id: nodeId, label: lecId, type: 'lec', color: themeColors[t.id], r: 9, themeId: t.id, scId: sc.id, lecId: lecId });
          links.push({ source: sc.id, target: nodeId, color: themeColors[t.id] });
        }
      });
    });
  });

  return { nodes, links };
}

let graphInitialised = false;
let graphSvg, graphSim;

function initGraph() {
  if (graphInitialised) return;
  graphInitialised = true;

  const container = document.getElementById('graph-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const cx = W / 2, cy = H / 2;

  const { nodes, links } = buildGraphData();

  const svg = d3.select('#graph-svg')
    .attr('width', W)
    .attr('height', H);

  // Zoom
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));

  // Links
  const link = g.selectAll('.link')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => d.color)
    .attr('stroke-width', d => {
      const src = nodes.find(n => n.id === d.source || n === d.source);
      if (!src) return 1;
      if (src.type === 'root') return 2.5;
      if (src.type === 'theme') return 1.5;
      return 1;
    });

  // Nodes
  const node = g.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', d => 'node node-' + d.type)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('click', (e, d) => { e.stopPropagation(); onNodeClick(d, node, link); });

  node.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.color)
    .attr('stroke', d => d.color);

  node.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => d.type === 'sub' ? d.r + 12 : 0)
    .text(d => {
      if (d.type === 'root') return d.label;
      if (d.type === 'theme') return d.label;
      if (d.type === 'sub') return d.label.length > 18 ? d.label.slice(0, 16) + '…' : d.label;
      return d.label;
    });

  // Click background to clear
  svg.on('click', () => {
    node.classed('dimmed', false);
    link.classed('dimmed', false);
  });

  // Simulation — tighter layout, stronger center pull
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      const src = d.source;
      if (typeof src === 'object') {
        if (src.type === 'root') return 120;
        if (src.type === 'theme') return 90;
        if (src.type === 'sub') return 55;
      }
      return 60;
    }).strength(1.2))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.type === 'root') return -600;
      if (d.type === 'theme') return -300;
      if (d.type === 'sub') return -120;
      return -50;
    }))
    .force('center', d3.forceCenter(cx, cy).strength(0.8))
    .force('radial', d3.forceRadial(d => {
      if (d.type === 'root') return 0;
      if (d.type === 'theme') return 130;
      if (d.type === 'sub') return 230;
      return 310;
    }, cx, cy).strength(0.6))
    .force('collision', d3.forceCollide().radius(d => d.r + 12))
    .on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  graphSim = sim;
}

function onNodeClick(d, node, link) {
  // Dim everything, highlight connected
  const connectedIds = new Set([d.id]);
  link.each(dd => {
    const srcId = typeof dd.source === 'object' ? dd.source.id : dd.source;
    const tgtId = typeof dd.target === 'object' ? dd.target.id : dd.target;
    if (srcId === d.id || tgtId === d.id) {
      connectedIds.add(srcId);
      connectedIds.add(tgtId);
    }
  });

  node.classed('dimmed', n => !connectedIds.has(n.id));
  link.classed('dimmed', dd => {
    const srcId = typeof dd.source === 'object' ? dd.source.id : dd.source;
    const tgtId = typeof dd.target === 'object' ? dd.target.id : dd.target;
    return !connectedIds.has(srcId) || !connectedIds.has(tgtId);
  });

  // Open panel
  openPanel(d);
}

function openPanel(d) {
  const panel = document.getElementById('graph-panel');
  const content = document.getElementById('panel-content');
  panel.classList.add('open');

  if (d.type === 'root') {
    content.innerHTML = `
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#C8B97A;margin-bottom:8px;">{{SUBJECT}}</div>
      <div style="font-size:12px;color:#666;font-family:'DM Mono',monospace;margin-bottom:20px;">{{META}}</div>
      <div style="font-size:13px;color:#AAA;line-height:1.7;">${themes.length} themes · ${lectures.length} lectures. Click any node to explore.</div>
    `;
    return;
  }

  if (d.type === 'theme') {
    const t = themes.find(t => t.id === d.themeId);
    const scs = subclusters[d.themeId] || [];
    content.innerHTML = `
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;">Theme</div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#E6E1D6;margin-bottom:6px;">${t.name}</div>
      <div style="font-size:12px;color:#666;margin-bottom:20px;">${t.sub}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:10px;opacity:0.8;">Sub-clusters</div>
      ${scs.map(sc => `
        <div style="background:#1A1A1A;border:1px solid #242424;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:3px solid ${d.color};"
             onclick="openPanelById('sub','${d.themeId}','${sc.id}')">
          <div style="font-size:13px;color:#DDD;font-family:'Syne',sans-serif;font-weight:600;">${sc.name}</div>
          <div style="font-size:10px;color:#555;font-family:'DM Mono',monospace;margin-top:4px;">${sc.lectures.join(' · ')}</div>
        </div>
      `).join('')}
    `;
    return;
  }

  if (d.type === 'sub') {
    const scs = subclusters[d.themeId] || [];
    const sc = scs.find(s => s.id === d.scId);
    if (!sc) return;
    content.innerHTML = `
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;">Concept Cluster</div>
      <div style="font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:#E6E1D6;margin-bottom:16px;line-height:1.2;">${sc.name}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Definition</div>
      <div style="font-size:12px;color:#AAA;line-height:1.7;margin-bottom:16px;">${sc.definition}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Key Concepts</div>
      <ul style="list-style:none;padding:0;margin-bottom:16px;">
        ${sc.keypoints.map(k => `<li style="font-size:11px;color:#999;padding:4px 0 4px 12px;position:relative;line-height:1.5;border-bottom:1px solid #1A1A1A;">
          <span style="position:absolute;left:0;color:${d.color};opacity:0.6;">›</span>${k}
        </li>`).join('')}
      </ul>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Example</div>
      <div style="font-size:12px;color:#AAA;line-height:1.7;margin-bottom:16px;">${sc.example}</div>
      ${sc.formula ? `
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Formulae</div>
        <div style="background:#0A0A0A;border:1px solid #242424;border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:11px;color:#C8B97A;line-height:2;white-space:pre-wrap;margin-bottom:16px;">${sc.formula}</div>
      ` : ''}
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Lectures</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${sc.lectures.map(l => `<span style="padding:6px 14px;border-radius:20px;border:1px solid ${d.color};color:${d.color};font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;"
          onclick="openPanelById('lec','${d.themeId}','${d.scId}','${l}')">${l}</span>`).join('')}
      </div>
    `;
    return;
  }

  if (d.type === 'lec') {
    const lec = lectures.find(l => l.id === d.lecId);
    if (!lec) return;
    content.innerHTML = `
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;">Lecture</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="padding:6px 14px;border:1px solid ${d.color};border-radius:6px;color:${d.color};font-family:'DM Mono',monospace;font-size:12px;">${lec.num}</div>
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#E6E1D6;line-height:1.2;">${lec.title}</div>
      </div>
      <div style="font-size:11px;color:#555;font-family:'DM Mono',monospace;margin-bottom:20px;">${lec.chapter}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:10px;opacity:0.8;">Concepts</div>
      <ul style="list-style:none;padding:0;margin-bottom:16px;">
        ${lec.concepts.map(c => `<li style="font-size:11px;color:#999;padding:5px 0 5px 12px;position:relative;line-height:1.5;border-bottom:1px solid #1A1A1A;">
          <span style="position:absolute;left:0;color:${d.color};opacity:0.6;">›</span>${c}
        </li>`).join('')}
      </ul>
      ${lec.formula ? `
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:${d.color};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8;">Formulae</div>
        <div style="background:#0A0A0A;border:1px solid #242424;border-radius:8px;padding:14px;font-family:'DM Mono',monospace;font-size:11px;color:#C8B97A;line-height:2;white-space:pre-wrap;">${lec.formula}</div>
      ` : ''}
    `;
  }
}

function openPanelById(type, themeId, scId, lecId) {
  const d = { type, themeId, scId, lecId, color: themeColors[themeId] };
  if (type === 'lec') d.lecId = lecId;
  openPanel(d);
}

function closePanel() {
  document.getElementById('graph-panel').classList.remove('open');
}
